# Render Deployment Configuration for Job Tracker Backend

services:
  # Backend Service (Node.js + Express)
  - type: web
    name: job-tracker-api
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # Add your AWS credentials here (or set in Render dashboard)
    # envVars:
    #   - key: AWS_ACCESS_KEY_ID
    #     sync: false
    #   - key: AWS_SECRET_ACCESS_KEY
    #     sync: false
    #   - key: AWS_REGION
    #     value: us-west-1
    #   - key: DYNAMODB_TABLE_NAME
    #     value: JobApplications

# Optional: PostgreSQL database (if needed in future)
# databases:
#   - name: job-tracker-db
#     plan: free
